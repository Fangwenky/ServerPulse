<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💻 ServerPulse - 服务器监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #f1f5f9;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .subtitle { color: #94a3b8; margin-bottom: 20px; }
        
        /* Status Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }
        .card h3 { font-size: 0.85rem; color: #94a3b8; margin-bottom: 10px; }
        .card .value { font-size: 1.8rem; font-weight: bold; }
        .card .unit { font-size: 0.9rem; color: #94a3b8; }
        
        .ok { color: #22c55e; }
        .warning { color: #f59e0b; }
        .error { color: #ef4444; }
        
        /* Charts */
        .chart-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }
        .chart-card h3 { margin-bottom: 15px; }
        .bar {
            height: 30px;
            background: #0f172a;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.5s;
        }
        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        
        /* Process List */
        .process-list {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }
        .process-list h3 { margin-bottom: 15px; }
        .process-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .process-name { color: #f1f5f9; }
        .process-cpu { color: #94a3b8; }
        
        /* Time */
        .time {
            text-align: center;
            color: #64748b;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        /* Auto refresh */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            background: #334155;
            color: #f1f5f9;
        }
        .btn:hover { background: #475569; }
        .btn.active { background: #22c55e; }
        
        /* Add Server */
        .add-server {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }
        .add-server h3 { margin-bottom: 15px; }
        .form-group { margin-bottom: 10px; }
        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f1f5f9;
        }
        .btn-primary {
            background: #22c55e;
            color: white;
            border: none;
        }
        .btn-primary:hover { background: #16a34a; }
        
        /* Server list */
        .server-item {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .server-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
        }
        .server-status.offline { background: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💻 ServerPulse</h1>
        <p class="subtitle">轻量级服务器监控面板</p>
        
        <div class="controls">
            <button class="btn" onclick="refresh()">🔄 刷新</button>
            <button class="btn" id="autoBtn" onclick="toggleAuto()">⏩ 自动刷新: 关</button>
        </div>
        
        <!-- Server List -->
        <div class="add-server">
            <h3>🖥️ 监控的服务器</h3>
            <div id="serverList">
                <div class="server-item">
                    <div>
                        <span class="server-status"></span>
                        <span style="margin-left: 10px;">localhost (本机)</span>
                    </div>
                    <span class="ok">在线</span>
                </div>
            </div>
        </div>
        
        <!-- Status Cards -->
        <div class="grid">
            <div class="card">
                <h3>🖥️ CPU 使用率</h3>
                <div class="value" id="cpu">--</div>
                <div class="unit">%</div>
            </div>
            <div class="card">
                <h3>💾 内存使用</h3>
                <div class="value" id="memory">--</div>
                <div class="unit">%</div>
            </div>
            <div class="card">
                <h3>💿 磁盘使用</h3>
                <div class="value" id="disk">--</div>
                <div class="unit">%</div>
            </div>
            <div class="card">
                <h3>📊 负载</h3>
                <div class="value" id="load">--</div>
            </div>
        </div>
        
        <!-- CPU Chart -->
        <div class="chart-card">
            <h3>📈 CPU 使用率历史</h3>
            <div id="cpuHistory"></div>
        </div>
        
        <!-- Memory Chart -->
        <div class="chart-card">
            <h3>📉 内存使用历史</h3>
            <div id="memHistory"></div>
        </div>
        
        <!-- Top Processes -->
        <div class="process-list">
            <h3>🔥 Top 5 进程</h3>
            <div id="processList">
                <div class="process-item">
                    <span class="process-name">--</span>
                    <span class="process-cpu">--%</span>
                </div>
            </div>
        </div>
        
        <p class="time">最后更新: <span id="lastUpdate">--</span></p>
    </div>

    <script>
        let autoRefresh = false;
        let cpuHistory = [];
        let memHistory = [];
        
        // Simulated data (replace with real API calls)
        function getServerData() {
            return {
                cpu: Math.floor(Math.random() * 30 + 10),
                memory: Math.floor(Math.random() * 40 + 30),
                disk: 45,
                load: (Math.random() * 2 + 0.5).toFixed(2),
                processes: [
                    { name: 'node', cpu: Math.floor(Math.random() * 20) },
                    { name: 'python', cpu: Math.floor(Math.random() * 15) },
                    { name: 'chrome', cpu: Math.floor(Math.random() * 10) },
                    { name: 'sshd', cpu: Math.floor(Math.random() * 5) },
                    { name: 'docker', cpu: Math.floor(Math.random() * 8) }
                ]
            };
        }
        
        function updateUI(data) {
            // Update cards
            document.getElementById('cpu').textContent = data.cpu;
            document.getElementById('memory').textContent = data.memory;
            document.getElementById('disk').textContent = data.disk;
            document.getElementById('load').textContent = data.load;
            
            // Color coding
            document.getElementById('cpu').className = 'value ' + (data.cpu > 80 ? 'error' : data.cpu > 50 ? 'warning' : 'ok');
            document.getElementById('memory').className = 'value ' + (data.memory > 80 ? 'error' : data.memory > 50 ? 'warning' : 'ok');
            document.getElementById('disk').className = 'value ' + (data.disk > 90 ? 'error' : data.disk > 70 ? 'warning' : 'ok');
            
            // Update history
            cpuHistory.push(data.cpu);
            memHistory.push(data.memory);
            if (cpuHistory.length > 10) cpuHistory.shift();
            if (memHistory.length > 10) memHistory.shift();
            
            // Render history charts
            renderHistory('cpuHistory', cpuHistory, '%');
            renderHistory('memHistory', memHistory, '%');
            
            // Update processes
            const processList = document.getElementById('processList');
            processList.innerHTML = data.processes.map(p => 
                `<div class="process-item">
                    <span class="process-name">${p.name}</span>
                    <span class="process-cpu">${p.cpu}%</span>
                </div>`
            ).join('');
            
            // Update time
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
        }
        
        function renderHistory(id, data, unit) {
            const container = document.getElementById(id);
            container.innerHTML = data.map((v, i) => `
                <div class="bar">
                    <div class="bar-fill" style="width: ${v}%; background: ${v > 80 ? '#ef4444' : v > 50 ? '#f59e0b' : '#22c55e'}"></div>
                </div>
            `).join('');
        }
        
        function refresh() {
            const data = getServerData();
            updateUI(data);
        }
        
        function toggleAuto() {
            autoRefresh = !autoRefresh;
            const btn = document.getElementById('autoBtn');
            btn.className = 'btn ' + (autoRefresh ? 'active' : '');
            btn.textContent = autoRefresh ? '⏩ 自动刷新: 开' : '⏩ 自动刷新: 关';
            
            if (autoRefresh) {
                refresh();
                setInterval(refresh, 5000);
            }
        }
        
        // Initial load
        refresh();
    </script>
</body>
</html>
